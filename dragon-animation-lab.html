<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dragon Animation Lab</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --panel: rgba(255, 255, 255, 0.9);
      --line: rgba(92, 74, 45, 0.22);
      --gold: #5e3c12;
      --text: #201b14;
      --muted: #7a684f;
      --accent: #c86d16;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: Arial, sans-serif; }
    body { overflow: hidden; }
    #viewport { position: fixed; inset: 0; }
    #viewport canvas { display: block; width: 100%; height: 100%; }

    .panel {
      position: fixed;
      top: 16px;
      left: 16px;
      width: min(380px, calc(100vw - 32px));
      max-height: calc(100vh - 32px);
      overflow: auto;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 18px 42px rgba(58, 45, 26, 0.14);
      backdrop-filter: blur(10px);
    }
    .panel.is-collapsed {
      width: auto;
      min-width: 0;
      padding: 8px 10px;
      overflow: visible;
    }
    .panel.is-collapsed > :not(.panel-toggle) { display: none; }
    .panel-toggle {
      position: absolute;
      top: 10px;
      right: 10px;
      width: auto;
      min-height: 28px;
      padding: 4px 9px;
      font-size: 11px;
    }
    .panel.is-collapsed .panel-toggle { position: static; }

    h1 {
      margin: 0 0 12px;
      color: var(--gold);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .row { display: grid; grid-template-columns: 96px 1fr; gap: 10px; align-items: center; margin: 9px 0; }
    .wide { grid-template-columns: 1fr; }
    label, .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    select, input, textarea, button {
      width: 100%;
      border: 1px solid rgba(92, 74, 45, 0.28);
      background: rgba(255, 255, 255, 0.7);
      color: var(--text);
      font: inherit;
    }
    select, input { height: 34px; padding: 0 8px; }
    input[type="range"] { padding: 0; accent-color: var(--accent); }
    textarea { min-height: 92px; padding: 8px; resize: vertical; color: #4a3216; font-family: Consolas, monospace; font-size: 12px; }
    button {
      min-height: 34px;
      padding: 7px 10px;
      cursor: pointer;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 12px;
    }
    button:hover { border-color: rgba(200, 109, 22, 0.72); color: #8c4f0f; }
    .buttons { display: grid; grid-template-columns: repeat(auto-fit, minmax(84px, 1fr)); gap: 8px; }
    .status { margin-top: 10px; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .pill { display: inline-block; margin: 3px 4px 0 0; padding: 2px 6px; border: 1px solid rgba(92, 74, 45, 0.24); color: var(--gold); font-size: 11px; }
  </style>
</head>
<body>
<div id="viewport"></div>

<section class="panel">
  <button id="btn-panel-toggle" class="panel-toggle" type="button">Hide</button>
  <h1>Dragon Animation Lab</h1>

  <div class="row wide">
    <label for="model-select">Model</label>
    <select id="model-select"></select>
  </div>

  <div class="row wide">
    <label for="clip-select">Clip</label>
    <select id="clip-select"></select>
  </div>

  <div class="row wide">
    <label for="preset-select">Preset</label>
    <select id="preset-select">
      <option value="main">Main page, right side</option>
      <option value="front">Front wing check</option>
      <option value="profile">Side profile</option>
      <option value="high">High, smaller</option>
    </select>
  </div>

  <div class="buttons">
    <button id="btn-loop" type="button">Loop</button>
    <button id="btn-once" type="button">Once</button>
    <button id="btn-pause" type="button">Pause</button>
  </div>

  <div class="row">
    <label for="speed">Speed</label>
    <input id="speed" type="range" min="0" max="2" step="0.05" value="1">
  </div>
  <div class="row">
    <label for="scale">Scale</label>
    <input id="scale" type="range" min="0.3" max="3" step="0.02" value="1">
  </div>
  <div class="row">
    <label for="yaw">Yaw</label>
    <input id="yaw" type="range" min="-180" max="180" step="1" value="0">
  </div>
  <div class="row">
    <label for="pitch">Pitch</label>
    <input id="pitch" type="range" min="-90" max="90" step="1" value="0">
  </div>
  <div class="row">
    <label for="roll">Roll</label>
    <input id="roll" type="range" min="-90" max="90" step="1" value="0">
  </div>
  <div class="row">
    <label for="x">X</label>
    <input id="x" type="range" min="-3" max="3" step="0.02" value="0.3">
  </div>
  <div class="row">
    <label for="height">Y</label>
    <input id="height" type="range" min="-2" max="2" step="0.02" value="-0.1">
  </div>
  <div class="row">
    <label for="z">Z</label>
    <input id="z" type="range" min="-3" max="3" step="0.02" value="0">
  </div>
  <div class="row">
    <label for="camera">Camera</label>
    <input id="camera" type="range" min="2.5" max="12" step="0.1" value="6.2">
  </div>
  <div class="row">
    <label for="view-yaw">View yaw</label>
    <input id="view-yaw" type="range" min="-180" max="180" step="1" value="-8">
  </div>
  <div class="row">
    <label for="view-pitch">View pitch</label>
    <input id="view-pitch" type="range" min="-45" max="55" step="1" value="5">
  </div>

  <div class="buttons">
    <button id="btn-reset" type="button">Reset</button>
    <button id="btn-apply" type="button">Apply</button>
    <button id="btn-copy" type="button">Copy</button>
  </div>
  <div class="buttons">
    <button id="btn-save-main" type="button">Save main</button>
    <button id="btn-shot" type="button">Pose</button>
  </div>

  <div class="row wide">
    <label for="settings">Settings</label>
    <textarea id="settings" spellcheck="false"></textarea>
  </div>

  <div class="status" id="status">Loading FBX...</div>
</section>

<script type="importmap">
{
  "imports": {
    "three": "./vendor/three/three.module.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { FBXLoader } from './vendor/three/FBXLoader.js';
import { GLTFLoader } from './vendor/three/GLTFLoader.js';

const MODEL_SOURCES = [
  {
    id: 'sketchfab-blades-download-glb',
    label: 'Sketchfab GLB download (actual file)',
    type: 'gltf',
    url: './assets/models/the_elder_scrolls_blades_ancient_dragon.glb'
  },
  {
    id: 'sketchfab-blades-glb',
    label: 'Sketchfab GLB download (converted)',
    type: 'gltf',
    url: './assets/models/tes-blades-ancient-dragon.glb'
  },
  {
    id: 'sketchfab-blades-source-glb',
    label: 'Sketchfab GLB download in source/model.glb',
    type: 'gltf',
    url: './assets/models/tes-blades-ancient-dragon/source/model.glb'
  },
  {
    id: 'alduin-glb',
    label: 'Alduin GLB (static original)',
    type: 'gltf',
    url: './assets/models/alduin/source/Ps%20Alduin%20Dragon.glb'
  },
  {
    id: 'blades-fbx',
    label: 'Blades Ancient Dragon FBX (animated, broken)',
    type: 'fbx',
    url: './assets/models/tes-blades-ancient-dragon/source/Dragon_Ancient_Skeleton/Dragon_Ancient_Skeleton.fbx'
  },
  {
    id: 'blender-glb-merged-nla',
    label: 'Blender GLB - merged NLA clips',
    type: 'gltf',
    url: './assets/models/converted/dragon-ancient-merged-nla-prepost.glb'
  },
  {
    id: 'blender-glb-no-prepost',
    label: 'Test GLB - preserve axes, no pre/post',
    type: 'gltf',
    url: './assets/models/converted/dragon-ancient-preserve-no-prepost.glb'
  },
  {
    id: 'blender-glb-prepost',
    label: 'Test GLB - preserve axes, pre/post',
    type: 'gltf',
    url: './assets/models/converted/dragon-ancient-preserve-prepost.glb'
  },
  {
    id: 'blender-glb-auto-bones',
    label: 'Test GLB - auto bone orientation',
    type: 'gltf',
    url: './assets/models/converted/dragon-ancient-auto-bone-orientation.glb'
  },
  {
    id: 'blender-glb-idle-rest',
    label: 'Test GLB - Idle pose as rest',
    type: 'gltf',
    url: './assets/models/converted/dragon-ancient-idle-pose-as-rest-prepost.glb'
  }
];
const ORIGINAL_POSE_VALUE = '__original_pose__';
const DERIVED_FLIGHT_CLIP = 'Dragon_Ancient_Breath_FlightLoop';
const LAB_SETTINGS_KEY = 'cw_dragon_lab_settings_v1';
const MAIN_CINEMATIC_SETTINGS_KEY = 'cw_dragon_cinematic_settings_v7';
const queryParams = new URLSearchParams(window.location.search);
const viewport = document.getElementById('viewport');
const modelSelect = document.getElementById('model-select');
const clipSelect = document.getElementById('clip-select');
const presetSelect = document.getElementById('preset-select');
const settingsEl = document.getElementById('settings');
const statusEl = document.getElementById('status');

const controls = {
  speed: document.getElementById('speed'),
  scale: document.getElementById('scale'),
  yaw: document.getElementById('yaw'),
  pitch: document.getElementById('pitch'),
  roll: document.getElementById('roll'),
  x: document.getElementById('x'),
  height: document.getElementById('height'),
  z: document.getElementById('z'),
  camera: document.getElementById('camera'),
  viewYaw: document.getElementById('view-yaw'),
  viewPitch: document.getElementById('view-pitch')
};

const PRESETS = {
  main: {
    speed: 1,
    scale: 1,
    yaw: 0,
    pitch: 0,
    roll: 0,
    x: 0.3,
    height: -0.1,
    z: 0,
    camera: 6.2,
    viewYaw: -8,
    viewPitch: 5,
    clip: 'Dragon_Ancient_Attack_Breath'
  },
  front: {
    speed: 0.85,
    scale: 1.08,
    yaw: 0,
    pitch: 0,
    roll: 0,
    x: 0,
    height: 0,
    z: 0,
    camera: 5.6,
    viewYaw: 0,
    viewPitch: 5,
    clip: 'Dragon_Ancient_Idle_FlyTransition'
  },
  profile: {
    speed: 1,
    scale: 1,
    yaw: 88,
    pitch: 0,
    roll: 0,
    x: 0,
    height: 0,
    z: 0,
    camera: 6,
    viewYaw: -18,
    viewPitch: 6,
    clip: 'Dragon_Ancient_Patrol_Idle'
  },
  high: {
    speed: 0.9,
    scale: 0.76,
    yaw: -10,
    pitch: -4,
    roll: 0,
    x: 0.15,
    height: 0.74,
    z: -0.25,
    camera: 7.2,
    viewYaw: -6,
    viewPitch: 12,
    clip: 'Dragon_Ancient_Idle_FlyTransition'
  }
};

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 120);
camera.position.set(0, 1.1, Number(controls.camera.value));

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.7));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
viewport.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff, 0x6f6255, 2.0));
const key = new THREE.DirectionalLight(0xffffff, 2.6);
key.position.set(-4, 5, 4);
scene.add(key);
const rim = new THREE.DirectionalLight(0x8fb5ff, 1.3);
rim.position.set(4, 3, -4);
scene.add(rim);

const grid = new THREE.GridHelper(7, 14, 0x8a785f, 0xd0c6b5);
grid.position.y = -1.35;
scene.add(grid);

const root = new THREE.Group();
const modelSocket = new THREE.Group();
root.add(modelSocket);
scene.add(root);

let mixer = null;
let currentAction = null;
let loadedModel = null;
let clips = [];
let baseScale = 1;
let playing = true;
let drag = null;
let orbitYaw = THREE.MathUtils.degToRad(Number(controls.viewYaw.value));
let orbitPitch = THREE.MathUtils.degToRad(Number(controls.viewPitch.value));
let pendingSettings = readInitialSettings();
const clock = new THREE.Clock();

function fitModelInSocket(model) {
  modelSocket.position.set(0, 0, 0);
  modelSocket.rotation.set(0, 0, 0);
  modelSocket.scale.setScalar(1);
  model.updateMatrixWorld(true);

  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  baseScale = 3.2 / Math.max(size.x, size.y, size.z, 1);
  modelSocket.scale.setScalar(baseScale);
  modelSocket.position.set(-center.x * baseScale, -center.y * baseScale, -center.z * baseScale);
}

function readInitialSettings() {
  let result = null;
  try {
    result = JSON.parse(localStorage.getItem(LAB_SETTINGS_KEY) || 'null');
  } catch (e) { /* ignore */ }

  if (!result || typeof result !== 'object') result = {};
  for (const key of ['model', 'clip']) {
    const value = getQueryValue(key, key === 'model' ? 'dragonModel' : 'dragonClip');
    if (value) result[key] = value;
  }
  for (const key of ['speed', 'scale', 'yaw', 'pitch', 'roll', 'x', 'height', 'z', 'camera', 'viewYaw', 'viewPitch']) {
    const value = getQueryValue(key);
    if (value !== null) result[key] = Number(value);
  }
  return result;
}

function prepareMaterials(model) {
  model.traverse(obj => {
    if (!obj.isMesh || !obj.material) return;
    const wasArray = Array.isArray(obj.material);
    const materials = wasArray ? obj.material : [obj.material];
    const clones = materials.map(material => {
      const clone = material.clone();
      if (clone.color) clone.color.multiplyScalar(1.18);
      if (clone.emissive) {
        clone.emissive.setHex(0x150805);
        clone.emissiveIntensity = 0.18;
      }
      clone.side = THREE.DoubleSide;
      clone.needsUpdate = true;
      return clone;
    });
    obj.material = wasArray ? clones : clones[0];
  });
}

function captureOriginalPose(model) {
  model.traverse(obj => {
    obj.userData.labOriginalPose = {
      position: obj.position.clone(),
      quaternion: obj.quaternion.clone(),
      scale: obj.scale.clone()
    };
  });
}

function restoreOriginalPose() {
  if (!loadedModel) return;
  if (mixer) mixer.stopAllAction();
  currentAction = null;
  loadedModel.traverse(obj => {
    const pose = obj.userData.labOriginalPose;
    if (!pose) return;
    obj.position.copy(pose.position);
    obj.quaternion.copy(pose.quaternion);
    obj.scale.copy(pose.scale);
    obj.updateMatrix();
  });
  loadedModel.updateMatrixWorld(true);
  playing = false;
  document.getElementById('btn-pause').textContent = 'Resume';
  updateSettings();
}

function selectDefaultClip() {
  return getRequestedClip() ||
    clips.find(clip => isNamedClip(clip, 'Dragon_Ancient_Attack_Breath')) ||
    clips.find(clip => isNamedClip(clip, 'Dragon_Ancient_Idle_FlyTransition')) ||
    clips.find(clip => isNamedClip(clip, 'Dragon_Ancient_Patrol_Idle')) ||
    clips.find(clip => isNamedClip(clip, DERIVED_FLIGHT_CLIP)) ||
    clips.find(clip => isNamedClip(clip, 'Dragon_Ancient_Idle')) ||
    clips.find(clip => isNamedClip(clip, 'Dragon_Ancient_Dialogue_Relaxed_Idle')) ||
    clips.find(clip => /(^|[_|])idle($|[|])/i.test(clip.name)) ||
    clips[0];
}

function isNamedClip(clip, name) {
  return clip.name === name || clip.name.includes(`|${name}|`);
}

function buildPlayableClips(rawClips) {
  const result = rawClips.slice();
  const breath = rawClips.find(clip => /^Dragon_Ancient_Attack_Breath$/i.test(clip.name)) ||
    rawClips.find(clip => /attack_breath/i.test(clip.name));

  if (breath && THREE.AnimationUtils && typeof THREE.AnimationUtils.subclip === 'function') {
    const flightLoop = THREE.AnimationUtils.subclip(breath, DERIVED_FLIGHT_CLIP, 44, 150, 30);
    if (flightLoop && flightLoop.tracks && flightLoop.tracks.length) {
      result.unshift(flightLoop);
    }
  }

  return result;
}

function getQueryValue(...names) {
  for (const name of names) {
    const value = queryParams.get(name);
    if (value) return value;
  }
  return null;
}

function getRequestedClip() {
  const requested = getQueryValue('clip', 'dragonClip', 'dragonAnim') || pendingSettings.clip;
  if (!requested) return null;
  return clips.find(clip => clip.name === requested) ||
    clips.find(clip => clip.name.toLowerCase() === requested.toLowerCase()) ||
    clips.find(clip => isNamedClip(clip, requested)) ||
    null;
}

function playClip(name, loop = true) {
  if (name === ORIGINAL_POSE_VALUE) {
    restoreOriginalPose();
    return;
  }
  if (!mixer) return;

  const clip = clips.find(candidate => candidate.name === name);
  if (!clip) return;

  const action = mixer.clipAction(clip);
  action.reset();
  action.enabled = true;
  action.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, loop ? Infinity : 1);
  action.clampWhenFinished = !loop;
  action.play();
  if (currentAction && currentAction !== action) currentAction.crossFadeTo(action, 0.18, false);
  currentAction = action;
  playing = true;
  document.getElementById('btn-pause').textContent = 'Pause';
  updateSettings();
}

function updateTransform() {
  const yaw = THREE.MathUtils.degToRad(Number(controls.yaw.value));
  const pitch = THREE.MathUtils.degToRad(Number(controls.pitch.value));
  const roll = THREE.MathUtils.degToRad(Number(controls.roll.value));
  root.rotation.set(pitch, yaw, roll, 'YXZ');
  root.scale.setScalar(Number(controls.scale.value));
  root.position.set(
    Number(controls.x.value),
    Number(controls.height.value),
    Number(controls.z.value)
  );
  orbitYaw = THREE.MathUtils.degToRad(Number(controls.viewYaw.value));
  orbitPitch = THREE.MathUtils.degToRad(Number(controls.viewPitch.value));
  updateCamera();
  updateSettings();
}

function updateCamera() {
  const distance = Number(controls.camera.value);
  camera.position.x = Math.sin(orbitYaw) * Math.cos(orbitPitch) * distance;
  camera.position.y = 1.05 + Math.sin(orbitPitch) * distance;
  camera.position.z = Math.cos(orbitYaw) * Math.cos(orbitPitch) * distance;
  camera.lookAt(0, 0.1, 0);
}

function currentSettings() {
  return {
    clip: clipSelect.value,
    clipLabel: clipSelect.selectedOptions[0] ? clipSelect.selectedOptions[0].textContent : clipSelect.value,
    model: modelSelect.value,
    speed: Number(controls.speed.value),
    scale: Number(controls.scale.value),
    yaw: Number(controls.yaw.value),
    pitch: Number(controls.pitch.value),
    roll: Number(controls.roll.value),
    x: Number(controls.x.value),
    height: Number(controls.height.value),
    z: Number(controls.z.value),
    camera: Number(controls.camera.value),
    viewYaw: Number(controls.viewYaw.value),
    viewPitch: Number(controls.viewPitch.value),
    mainScene: mainSceneSettings()
  };
}

function mainSceneSettings() {
  const x = Number(controls.x.value);
  const y = Number(controls.height.value);
  const z = Number(controls.z.value);
  return {
    clip: clipSelect.value === ORIGINAL_POSE_VALUE ? '' : clipSelect.value,
    anchorX: clamp(0.28 + x * 0.04, 0.08, 0.92),
    anchorY: clamp(0.22 - y * 0.05, 0.12, 0.92),
    anchorXWide: clamp(0.26 + x * 0.035, 0.08, 0.92),
    anchorYWide: clamp(0.2 - y * 0.045, 0.12, 0.92),
    scrollAnchorX: clamp(0.18 + x * 0.035, 0.02, 0.98),
    scrollAnchorY: clamp(-0.42 - y * 0.03, -0.58, 0.45),
    zPlane: clamp(-0.42 + z * 0.16, -3, 2),
    scale: clamp(0.54 * Number(controls.scale.value), 0.18, 1.4),
    pitch: Number(controls.pitch.value),
    yaw: Number(controls.yaw.value),
    roll: Number(controls.roll.value)
  };
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function updateSettings() {
  settingsEl.value = JSON.stringify(currentSettings(), null, 2);
}

async function load() {
  modelSelect.innerHTML = '';
  MODEL_SOURCES.forEach(source => {
    const option = document.createElement('option');
    option.value = source.id;
    option.textContent = source.label;
    modelSelect.appendChild(option);
  });
  const requestedModel = pendingSettings.model || getQueryValue('model', 'dragonModel');
  const source = MODEL_SOURCES.find(candidate => candidate.id === requestedModel) || MODEL_SOURCES[0];
  modelSelect.value = source.id;
  await loadModel(source);
}

async function loadModel(source) {
  statusEl.textContent = `Loading ${source.label}...`;
  if (mixer) mixer.stopAllAction();
  mixer = null;
  currentAction = null;
  loadedModel = null;
  clips = [];
  modelSocket.clear();
  clipSelect.innerHTML = '';

  const loader = source.type === 'gltf' ? new GLTFLoader() : new FBXLoader();
  const asset = await loader.loadAsync(source.url);
  const model = source.type === 'gltf' ? asset.scene : asset;
  loadedModel = model;
  prepareMaterials(model);
  fitModelInSocket(model);
  captureOriginalPose(model);
  modelSocket.add(model);
  clips = buildPlayableClips(asset.animations || model.animations || []);

  const originalOption = document.createElement('option');
  originalOption.value = ORIGINAL_POSE_VALUE;
  originalOption.textContent = clips.length ? 'Original model pose, no animation' : 'Static model, no animation';
  clipSelect.appendChild(originalOption);

  clips.forEach(clip => {
    const option = document.createElement('option');
    option.value = clip.name;
    option.textContent = `${clip.name} (${clip.duration.toFixed(2)}s)`;
    clipSelect.appendChild(option);
  });

  if (clips.length) {
    mixer = new THREE.AnimationMixer(model);
    const defaultClip = selectDefaultClip();
    if (defaultClip) {
      clipSelect.value = defaultClip.name;
      playClip(defaultClip.name, true);
    }
  } else {
    clipSelect.value = ORIGINAL_POSE_VALUE;
    restoreOriginalPose();
  }

  statusEl.innerHTML = [
    `<span class="pill">${clips.length} clips</span>`,
    `<span class="pill">${source.url.split('/').pop()}</span>`
  ].join('');
  window.dragonLab = {
    playClip,
    showOriginal: () => {
      clipSelect.value = ORIGINAL_POSE_VALUE;
      restoreOriginalPose();
    },
    currentSettings,
    clips: () => [ORIGINAL_POSE_VALUE, ...clips.map(clip => clip.name)]
  };

  if (pendingSettings && Object.keys(pendingSettings).length) {
    applySettings(pendingSettings, { keepClipIfMissing: true });
    pendingSettings = {};
  }
}

function setControlValues(values) {
  Object.entries(controls).forEach(([key, control]) => {
    if (!control || values[key] === undefined || values[key] === null) return;
    const next = Number(values[key]);
    if (Number.isFinite(next)) control.value = String(next);
  });
}

function applySettings(values, options = {}) {
  if (!values || typeof values !== 'object') return false;
  setControlValues(values);
  if (values.model && values.model !== modelSelect.value) {
    const source = MODEL_SOURCES.find(candidate => candidate.id === values.model);
    if (source) {
      pendingSettings = { ...values, model: source.id };
      modelSelect.value = source.id;
      loadModel(source).catch(error => {
        console.error(error);
        statusEl.textContent = error.message || String(error);
      });
      return true;
    }
  }
  if (values.clip) {
    const match = [...clipSelect.options].find(option => option.value === values.clip || option.textContent.includes(values.clip));
    if (match) {
      clipSelect.value = match.value;
      playClip(match.value, true);
    } else if (!options.keepClipIfMissing) {
      statusEl.textContent = `Clip not found: ${values.clip}`;
    }
  }
  updateTransform();
  return true;
}

function applyPreset(name) {
  const preset = PRESETS[name] || PRESETS.main;
  applySettings(preset, { keepClipIfMissing: true });
}

modelSelect.addEventListener('change', () => {
  const source = MODEL_SOURCES.find(candidate => candidate.id === modelSelect.value);
  if (source) loadModel(source).catch(error => {
    console.error(error);
    statusEl.textContent = error.message || String(error);
  });
});
document.getElementById('btn-loop').addEventListener('click', () => playClip(clipSelect.value, true));
document.getElementById('btn-once').addEventListener('click', () => playClip(clipSelect.value, false));
document.getElementById('btn-pause').addEventListener('click', event => {
  playing = !playing;
  event.target.textContent = playing ? 'Pause' : 'Resume';
});
document.getElementById('btn-reset').addEventListener('click', () => {
  presetSelect.value = 'main';
  applyPreset('main');
});
document.getElementById('btn-apply').addEventListener('click', () => {
  try {
    applySettings(JSON.parse(settingsEl.value));
    localStorage.setItem(LAB_SETTINGS_KEY, JSON.stringify(currentSettings()));
    statusEl.textContent = 'Settings applied.';
  } catch (error) {
    statusEl.textContent = error.message || String(error);
  }
});
document.getElementById('btn-copy').addEventListener('click', async () => {
  updateSettings();
  try { await navigator.clipboard.writeText(settingsEl.value); } catch (e) { /* ignore */ }
});
document.getElementById('btn-save-main').addEventListener('click', async () => {
  const settings = currentSettings();
  try {
    localStorage.setItem(LAB_SETTINGS_KEY, JSON.stringify(settings));
    localStorage.setItem(MAIN_CINEMATIC_SETTINGS_KEY, JSON.stringify(settings.mainScene));
    statusEl.textContent = 'Saved for main page cinematic mode.';
  } catch (error) {
    statusEl.textContent = error.message || String(error);
  }
});
document.getElementById('btn-shot').addEventListener('click', () => {
  renderer.render(scene, camera);
  const a = document.createElement('a');
  a.href = renderer.domElement.toDataURL('image/png');
  a.download = `${clipSelect.value || 'dragon'}-pose.png`;
  a.click();
});
document.getElementById('btn-panel-toggle').addEventListener('click', event => {
  const panel = event.target.closest('.panel');
  const collapsed = panel.classList.toggle('is-collapsed');
  event.target.textContent = collapsed ? 'Controls' : 'Hide';
});
presetSelect.addEventListener('change', () => applyPreset(presetSelect.value));
clipSelect.addEventListener('change', () => playClip(clipSelect.value, true));
Object.values(controls).forEach(control => {
  control.addEventListener('input', updateTransform);
});
controls.speed.addEventListener('input', updateSettings);

renderer.domElement.addEventListener('pointerdown', event => {
  drag = { x: event.clientX, y: event.clientY, yaw: orbitYaw, pitch: orbitPitch };
  renderer.domElement.setPointerCapture(event.pointerId);
});
renderer.domElement.addEventListener('pointermove', event => {
  if (!drag) return;
  orbitYaw = drag.yaw - (event.clientX - drag.x) * 0.006;
  orbitPitch = THREE.MathUtils.clamp(drag.pitch + (event.clientY - drag.y) * 0.004, -0.75, 0.95);
  controls.viewYaw.value = String(Math.round(THREE.MathUtils.radToDeg(orbitYaw)));
  controls.viewPitch.value = String(Math.round(THREE.MathUtils.radToDeg(orbitPitch)));
  updateCamera();
  updateSettings();
});
renderer.domElement.addEventListener('pointerup', () => { drag = null; });
renderer.domElement.addEventListener('wheel', event => {
  event.preventDefault();
  const next = THREE.MathUtils.clamp(Number(controls.camera.value) + event.deltaY * 0.006, 2.5, 12);
  controls.camera.value = String(next);
  updateTransform();
  updateSettings();
}, { passive: false });

function resize() {
  const width = window.innerWidth || 1;
  const height = window.innerHeight || 1;
  renderer.setSize(width, height, false);
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
}

function tick() {
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 0.05);
  if (mixer && playing) {
    mixer.timeScale = Number(controls.speed.value);
    mixer.update(dt);
  }
  renderer.render(scene, camera);
}

window.addEventListener('resize', resize);
resize();
updateTransform();
load().catch(error => {
  console.error(error);
  statusEl.textContent = error.message || String(error);
});
tick();
</script>
</body>
</html>
